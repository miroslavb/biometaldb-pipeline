<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>[Co(en)₂Cl₂]⁺ — 3D Viewer</title>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<style>
body { margin: 0; background: #0d1117; font-family: system-ui, sans-serif; }
.hdr { background: linear-gradient(135deg, #0f172a, #1e3a5f); color: #fff; padding: 1rem 2rem; }
.hdr h1 { margin: 0; font-size: 1.3rem; }
.hdr .info { color: #94a3b8; font-size: .85rem; margin-top: .3rem; }
#viewer { width: 100%; height: 80vh; position: relative; }
.controls { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; gap: 6px; }
.controls button { padding: 6px 12px; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; cursor: pointer; font-size: 12px; }
.controls button:hover { background: #30363d; }
</style>
</head>
<body>
<div class="hdr">
<h1>[Co(en)₂Cl₂]⁺ — Co(III), октаэдр</h1>
<div class="info">Лиганды: 2 × этилендиамин (N,N-хелат) + 2 × Cl⁻ | GFN2-xTB оптимизация</div>
</div>
<div id="viewer">
<div class="controls">
<button onclick="v.setStyle({}, {stick:{radius:0.12,colorscheme:'Jmol'}}); v.render()">Stick</button>
<button onclick="v.setStyle({}, {sphere:{scale:0.3}, stick:{radius:0.08,colorscheme:'Jmol'}}); v.render()">Ball+Stick</button>
<button onclick="v.spin(!v.spinState)">Spin</button>
</div>
</div>
<script>
let v = $3Dmol.createViewer("viewer", {backgroundColor: "#0d1117"});
fetch("/viewer/Co_en2_Cl2.xyz")
  .then(r => r.text())
  .then(xyz => {
    v.addModel(xyz, "xyz");
    v.setStyle({}, {stick:{radius:0.12,colorscheme:'Jmol'}});
    v.zoomTo();
    v.render();
  });
</script>
</body>
</html>
